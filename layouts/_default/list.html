{{ define "main" }}
<header>
    <h1>{{ .Site.Title }}</h1>
</header>
<ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    </li>
    {{ end }}
</ul>
{{ end }}
