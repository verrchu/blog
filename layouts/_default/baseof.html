<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #f0f3f6; background: #0a0c10; margin: 0; }
        main { max-width: 760px; margin: 2rem auto; padding: 0 1.25rem; }
        a { color: #71b7ff; }
        a:hover { text-decoration: underline; }
        h1, h2, h3 { line-height: 1.25; color: #f0f3f6; }
        h1 { font-size: 1.7rem; margin-bottom: 0.25rem; }
        .post-date { color: #9ea7b3; font-size: 0.9rem; margin-top: 0; }
        article header { margin-bottom: 2rem; }
        code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
        :not(pre) > code { background: #272b33; color: #f0f3f6; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
        .highlight { background: #0d1117; border: 1px solid #7a828e; border-radius: 6px; overflow-x: auto; margin: 1em 0; font-size: 0.85rem; line-height: 1.45; }
        .highlight pre { padding: 1rem; margin: 0; border: 0; border-radius: 0; overflow: visible; }
        .highlight table { border-spacing: 0; margin: 0; width: 100%; }
        .highlight table td { padding: 0; }
        .highlight table td:first-child pre { padding-right: 0; }
        .highlight table td:last-child pre { padding-left: 0; }
        .highlight:has(code.language-text),
        .highlight:has(code.language-text) > pre,
        .highlight:has(code.language-text) > div { background: #0a0c10 !important; }
        blockquote { border-left: 3px solid #7a828e; padding-left: 1rem; color: #9ea7b3; margin-left: 0; }
        hr { border: 0; border-top: 1px solid #7a828e; margin: 2rem 0; }
        nav.site-nav { margin-bottom: 2rem; font-size: 0.9rem; }
        nav.site-nav a { color: #9ea7b3; text-decoration: none; }
        nav.site-nav a:hover { color: #f0f3f6; }
        .home-header { padding-bottom: 1rem; border-bottom: 1px solid #7a828e; margin-bottom: 1.5rem; }
        .home-header h1 { margin-bottom: 0; }
        ul.post-list { list-style: none; padding: 0; }
        ul.post-list li { padding: 0.75rem 0; border-bottom: 1px solid #272b33; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
        ul.post-list li:last-child { border-bottom: 0; }
        ul.post-list .post-link { font-size: 1.05rem; }
        ul.post-list .post-date { display: inline; margin-left: 0; color: #9ea7b3; flex-shrink: 0; }
        section.comments { margin-top: 3rem; border-top: 1px solid #7a828e; padding-top: 2rem; }
    </style>
</head>
<body>
    <main>
        {{ if not .IsHome }}<nav class="site-nav"><a href="{{ .Site.BaseURL }}">Back to all posts</a></nav>{{ end }}
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
