<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    <link rel="alternate" type="application/rss+xml" href="{{ absURL "index.xml" }}" title="{{ .Site.Title }}">
    <link rel="icon" type="image/svg+xml" href="{{ absURL "favicon.svg" }}">
    {{- $description := default .Site.Params.description .Description }}
    {{- $ogType := default (cond .IsPage "article" "website") .Params.og_type }}
    <meta name="description" content="{{ $description }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ $description }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:type" content="{{ $ogType }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:locale" content="en_US">

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #f0f3f6; background: #0a0c10; margin: 0; }
        main { max-width: 760px; margin: 2rem auto; padding: 0 1.25rem; }
        a { color: #71b7ff; }
        a:hover { text-decoration: underline; }
        h1, h2, h3 { line-height: 1.25; color: #f0f3f6; }
        h1 { font-size: 1.7rem; margin-bottom: 0.25rem; }
        .post-date { color: #9ea7b3; font-size: 0.9rem; margin-top: 0; }
        article header { margin-bottom: 2rem; }
        code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
        pre { overflow-x: auto; max-width: 100%; }
        :not(pre) > code { background: #272b33; color: #f0f3f6; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
        .highlight { background: #0d1117; border: 1px solid #7a828e; border-radius: 6px; overflow-x: auto; margin: 1em 0; font-size: 0.85rem; line-height: 1.45; }
        .highlight pre { padding: 1rem; margin: 0; border: 0; border-radius: 0; overflow: visible; }
        .highlight table { border-spacing: 0; margin: 0; width: 100%; }
        .highlight table td { padding: 0; }
        .highlight table td:first-child pre { padding-right: 0; }
        .highlight table td:last-child pre { padding-left: 0; }
        .highlight:has(code.language-text),
        .highlight:has(code.language-text) > pre,
        .highlight:has(code.language-text) > div { background: #0a0c10 !important; }
        blockquote { border-left: 3px solid #7a828e; padding-left: 1rem; color: #9ea7b3; margin-left: 0; }
        table { border-collapse: collapse; margin: 1em 0; font-size: 0.95rem; }
        th, td { border: 1px solid #7a828e; padding: 0.4rem 0.75rem; text-align: left; }
        th { background: rgba(122, 130, 142, 0.08); }
        .callout { background: rgba(122, 130, 142, 0.08); border-left: 3px solid #7a828e; border-radius: 0 6px 6px 0; padding: 0.75rem 1rem; margin: 1.5em 0; }
        .callout > p:first-child { margin-top: 0; }
        .callout > p:last-child { margin-bottom: 0; }
        .callout-title { font-size: 1.1rem; font-weight: 600; }
        hr { border: 0; border-top: 1px solid #7a828e; margin: 1rem 0; }
        .site-header { display: flex; justify-content: space-between; align-items: baseline; gap: 1.5rem; flex-wrap: wrap; padding-bottom: 0.75rem; border-bottom: 1px solid #7a828e; margin-bottom: 2rem; }
        .site-header-left, .site-header nav { display: flex; align-items: baseline; gap: 1rem; }
        .site-header .site-name { color: #f0f3f6; text-decoration: none; font-weight: 600; font-size: 1.05rem; }
        .site-header .site-name:hover { text-decoration: underline; }
        .site-header a:not(.site-name) { color: #9ea7b3; text-decoration: none; font-size: 0.9rem; }
        .site-header a:not(.site-name):hover { color: #f0f3f6; }
        ul.post-list { list-style: none; padding: 0; }
        ul.post-list li { padding: 0.75rem 0; border-bottom: 1px solid #272b33; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
        ul.post-list li:last-child { border-bottom: 0; }
        ul.post-list .post-link { font-size: 1.05rem; }
        ul.post-list .post-date { display: inline; margin-left: 0; color: #9ea7b3; flex-shrink: 0; }
        section.comments { margin-top: 1rem; border-top: 1px solid #7a828e; padding-top: 2rem; }
        details { margin: 0.4em 0; }
        details > summary { cursor: pointer; padding: 0.25rem 0; }
        details[open] { margin: 1em 0; border: 1px solid #7a828e; border-radius: 6px; padding: 0.5rem 1rem; }
        details[open] > summary { margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #272b33; }
    </style>
    <script data-goatcounter="https://eterekhin.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</head>
<body>
    <main>
        <header class="site-header">
            <div class="site-header-left">
                <a class="site-name" href="{{ .Site.BaseURL }}">Evgeniy Terekhin</a>
                <a href="{{ absURL "about/" }}">About me</a>
            </div>
            <nav>
                <a href="{{ .Site.BaseURL }}">Posts</a>
                <a href="{{ absURL "index.xml" }}">RSS</a>
            </nav>
        </header>
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
