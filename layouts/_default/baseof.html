<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #222; background: #fafafa; margin: 0; }
        main { max-width: 760px; margin: 2rem auto; padding: 0 1.25rem; }
        a { color: #0a58ca; }
        a:hover { text-decoration: underline; }
        h1, h2, h3 { line-height: 1.25; }
        h1 { font-size: 1.7rem; margin-bottom: 0.25rem; }
        .post-date { color: #777; font-size: 0.9rem; margin-top: 0; }
        article header { margin-bottom: 2rem; }
        pre { background: #0d1117; color: #e6edf3; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; line-height: 1.45; }
        code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
        :not(pre) > code { background: #eef0f3; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.9em; }
        blockquote { border-left: 3px solid #c0c0c0; padding-left: 1rem; color: #555; margin-left: 0; }
        nav.site-nav { margin-bottom: 2rem; font-size: 0.9rem; }
        nav.site-nav a { color: #555; text-decoration: none; }
        ul.post-list { list-style: none; padding: 0; }
        ul.post-list li { margin-bottom: 1rem; }
        ul.post-list .post-date { display: inline; margin-left: 0.5rem; }
    </style>
</head>
<body>
    <main>
        <nav class="site-nav"><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></nav>
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
